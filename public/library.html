<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Library - Starfish Tarot</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Padauk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0a1128">
    <link rel="icon" type="image/png" href="/icons/icon-512x512.png">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">

</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo" style="text-decoration: none;">Starfish Tarot</a>
        <div class="auth-links">
            <a href="index.html" class="nav-link">Home</a>
        </div>
    </nav>

    <main class="library-container">
        <h1 class="glow-text text-center">Tarot Library</h1>
        
        <div class="filter-group">
            <button class="filter-btn active" data-filter="all">All Cards</button>
            <button class="filter-btn" data-filter="Major Arcana">Major</button>
            <button class="filter-btn" data-filter="Wands">Wands</button>
            <button class="filter-btn" data-filter="Cups">Cups</button>
            <button class="filter-btn" data-filter="Swords">Swords</button>
            <button class="filter-btn" data-filter="Pentacles">Pentacles</button>
        </div>

        <div id="loading" class="loading-text">Loading Cards...</div>

        <div id="card-grid" class="card-grid"></div>
    </main>
    <div id="readingModal" class="modal-overlay hidden">
        <div class="modal-content reading-modal-box">
            <button class="close-modal-btn" onclick="closeReadingModal()">&times;</button>
            <div class="reading-content">
                <div class="reading-image">
                    <img id="modalCardImg" src="" alt="Card Image">
                </div>
                <div class="reading-text-col" style=" text-align: center;">
                    <h2 id="modalCardName" style="color: var(--accent-cyan); margin-bottom: 5px;"></h2>
                    <p id="modalCardType" style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 15px;"></p>
                    <div class="meaning-box">
                        <p id="modalCardKeywords" style="color: #FFD700; font-size: 0.9rem; margin-bottom: 10px;"></p>
                        <p id="modalCardMeaning" style="line-height: 1.8; color: var(--text-main);"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="js/config.js"></script>
    <script src="/js/footer.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/tarot.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('ServiceWorker registration successful');
            })
            .catch(err => {
              console.log('ServiceWorker registration failed: ', err);
            });
        });
      }
    </script>

</body>
</html>
