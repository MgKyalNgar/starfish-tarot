<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Starfish Tarot</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Padauk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0a1128">
    <link rel="icon" type="image/png" href="/icons/icon-512x512.png">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">

</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo" style="text-decoration: none;">Starfish Tarot</a>
        <div class="auth-links">
            <a href="library.html" class="nav-link">Library</a>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-box">
            <h2 id="authTitle" class="glow-text text-center" style="font-size: 2rem;">Login</h2>
            <p id="authSubtitle" class="text-center subtitle">Starfish Tarot မှ ကြိုဆိုပါသည်</p>

            <form id="authForm">
                <div class="input-group" id="nameGroup" style="display: none;">
                    <label for="userName">အမည်</label>
                    <input type="text" id="userName" placeholder="Mg Kyal Ngar">
                </div>
                <div class="input-group">
                    <label for="email">အီးမေးလ်</label>
                    <input type="email" id="email" required placeholder="your@email.com">
                </div>
                <div class="input-group">
                    <label for="password">စကားဝှက် (Password)</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="action-btn" style="width: 100%; margin-top: 1rem;" id="authSubmitBtn">အကောင့်ဝင်မည်</button>
            </form>

            <div class="auth-switch text-center" style="margin-top: 1.5rem;">
                <span id="authSwitchText" style="color: var(--text-muted);">အကောင့်မရှိသေးဘူးလား?</span>
                <a href="#" id="authSwitchLink" style="color: var(--accent-cyan); text-decoration: none; margin-left: 5px;">အသစ်ဖွင့်မည်</a>
            </div>
        </div>
    </main>

    <footer>
        © 2026 Starfish Tarot. Created by Mg Kyal Ngar.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('ServiceWorker registration successful');
            })
            .catch(err => {
              console.log('ServiceWorker registration failed: ', err);
            });
        });
      }
    </script>

</body>
</html>
